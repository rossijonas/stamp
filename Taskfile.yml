version: '3'

tasks:
  default:
    desc: "Lists available tasks"
    cmds:
      - task --list

  build:
    desc: "Builds the stamp binary"
    cmds:
      - mkdir -p bin
      - go build -ldflags="-X github.com/rossijonas/stamp/internal/cli.Version=dev -X github.com/rossijonas/stamp/internal/cli.Commit=$(git rev-parse --short HEAD 2>/dev/null || echo none) -X github.com/rossijonas/stamp/internal/cli.Date=$(date -u +%Y-%m-%d)" -o bin/stamp ./cmd/stamp

  build:all:
    desc: "Cross-compile for all supported platforms (requires goreleaser)"
    cmds:
      - "sh -c 'which goreleaser 2>/dev/null || (echo \"goreleaser not installed. Run: go install github.com/goreleaser/goreleaser/v2@latest\" && exit 1)'"
      - goreleaser build --snapshot --clean

  test:
    desc: "Runs all unit tests and enforces 90% coverage"
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - "go tool cover -func=coverage.out | awk -v threshold=90.0 '/total/ {cov=substr($3,1,length($3)-1); if (cov+0 < threshold) {print \"Error: Coverage below \" threshold \"% (\" cov \"%)\"; exit 1} else {print \"Coverage is good (\" cov \"%)\"}}'"

  lint:
    desc: "Runs golangci-lint"
    cmds:
      - golangci-lint run

  verify:
    desc: "Verifies module dependencies and checksums"
    cmds:
      - go fmt ./...
      - go mod tidy
      - go mod verify

  security:
    desc: "Runs govulncheck for known vulnerabilities"
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  check:
    desc: "Runs all quality gates (run this before PR)"
    cmds:
      - task: verify
      - task: lint
      - task: test
      - task: security

  docs:
    desc: "Generates CLI documentation (Markdown + man pages)"
    cmds:
      - go run ./tools/docgen/

  clean:
    desc: "Removes build artifacts"
    cmds:
      - rm -rf bin/
