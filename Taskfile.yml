version: '3'

tasks:
  default:
    desc: "Lists available tasks"
    cmds:
      - task --list

  build:
    desc: "Builds the stamp binary"
    cmds:
      - mkdir -p bin
      - go build -ldflags="-X github.com/rossijonas/stamp/internal/cli.Version=$(git describe --tags --abbrev=0 2>/dev/null || echo dev) -X github.com/rossijonas/stamp/internal/cli.Commit=$(git rev-parse --short HEAD 2>/dev/null || echo none) -X github.com/rossijonas/stamp/internal/cli.Date=$(date -u +%Y-%m-%d)" -o bin/stamp ./cmd/stamp

  build:all:
    desc: "Cross-compile for all supported platforms (requires goreleaser)"
    cmds:
      - "sh -c 'which goreleaser 2>/dev/null || (echo \"goreleaser not installed. Run: go install github.com/goreleaser/goreleaser/v2@latest\" && exit 1)'"
      - goreleaser build --snapshot --clean

  test:
    desc: "Runs all unit tests and enforces 90% coverage"
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - "go tool cover -func=coverage.out | awk -v threshold=90.0 '/total/ {cov=substr($3,1,length($3)-1); if (cov+0 < threshold) {print \"Error: Coverage below \" threshold \"% (\" cov \"%)\"; exit 1} else {print \"Coverage is good (\" cov \"%)\"}}'"

  test:integration:
    desc: "Run integration smoke tests in Docker across all target platforms"
    deps:
      - build
    cmds:
      - task: test:integration:platform
        vars: { DISTRO: ubuntu }
      - task: test:integration:platform
        vars: { DISTRO: debian }
      - task: test:integration:platform
        vars: { DISTRO: fedora }
      - task: test:integration:platform
        vars: { DISTRO: centos }
      - task: test:integration:platform
        vars: { DISTRO: rocky }
      - task: test:integration:platform
        vars: { DISTRO: arch }
      - task: test:integration:platform
        vars: { DISTRO: opensuse }

  test:integration:platform:
    desc: "Run integration tests for a single platform (internal)"
    internal: true
    cmds:
      - cmd: docker build --build-arg BIN=bin/stamp -f test/Dockerfile.{{.DISTRO}} -t stamp-test-{{.DISTRO}} .
        silent: true
      - docker run --rm stamp-test-{{.DISTRO}}

  lint:
    desc: "Runs golangci-lint"
    cmds:
      - golangci-lint run

  lint:sh:
    desc: "Lints shell scripts with shellcheck"
    cmds:
      - "sh -c 'which shellcheck 2>/dev/null || (echo \"shellcheck not installed. Install: sudo dnf install -y shellcheck\" && exit 1)'"
      - shellcheck test/integration/*.sh

  verify:
    desc: "Verifies module dependencies and checksums"
    cmds:
      - go fmt ./...
      - go mod tidy
      - go mod verify

  security:
    desc: "Runs govulncheck for known vulnerabilities"
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  check:
    desc: "Runs all quality gates (run this before PR)"
    cmds:
      - task: verify
      - task: lint
      - task: test
      - task: security

  docs:
    desc: "Generates CLI documentation (Markdown + man pages)"
    cmds:
      - go run ./tools/docgen/

  clean:
    desc: "Removes build artifacts"
    cmds:
      - rm -rf bin/
