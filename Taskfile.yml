version: '3'

tasks:
  default:
    desc: "Lists available tasks"
    cmds:
      - task --list

  build:
    desc: "Builds the stamp binary"
    cmds:
      - mkdir -p bin
      - go build -o bin/stamp cmd/stamp/main.go

  test:
    desc: "Runs all unit tests and enforces 90% coverage"
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}' | awk '{if ($1 < 90.0) {print "Error:\nCoverage is below 90% ("$1"%)"; exit 1} else {print "Coverage is good ("$1"%)"}}'

  lint:
    desc: "Runs golangci-lint"
    cmds:
      - golangci-lint run

  verify:
    desc: "Verifies module dependencies and checksums"
    cmds:
      - go fmt ./...
      - go mod tidy
      - go mod verify

  security:
    desc: "Runs govulncheck for known vulnerabilities"
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  check:
    desc: "Runs all quality gates (run this before PR)"
    cmds:
      - task: verify
      - task: lint
      - task: test
      - task: security

  clean:
    desc: "Removes build artifacts"
    cmds:
      - rm -rf bin/
