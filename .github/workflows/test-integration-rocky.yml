name: "intgr.: rocky"

on:
  workflow_run:
    workflows: ["Auto Tag & Release"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download linux/amd64 binary from release
        run: |
          gh release download "$TAG" --pattern "*linux_amd64.tar.gz" \
            --dir /tmp --clobber
          tar xzf /tmp/stamp_*_linux_amd64.tar.gz -C /tmp
          mkdir -p bin && mv /tmp/stamp bin/stamp
        env:
          TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}

      - name: Build Docker image
        run: |
          docker build --build-arg BIN=bin/stamp \
            -f test/Dockerfile.rocky -t stamp-test-rocky .

      - name: Run integration tests
        run: docker run --rm stamp-test-rocky
