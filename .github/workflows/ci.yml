---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Verify Dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy. Run 'go mod tidy' and commit the changes." && exit 1)
          go mod verify

      - name: Verify docs are up to date
        run: |
          task docs
          git diff --exit-code docs/usage/ || (echo "error: docs out of date — run 'task docs' and commit changes" && exit 1)

      - name: Run Tests & Enforce Coverage
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          TOTAL_COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total Coverage: $TOTAL_COVERAGE%"
          if (( $(echo "$TOTAL_COVERAGE < 90.0" | bc -l) )); then
            echo "Error: Test coverage ($TOTAL_COVERAGE%) is below the required 90% threshold."
            exit 1
          fi

  lint-commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check commits follow Conventional Commits
        run: |
          FOUND_VALID=false

          while read -r line; do
            if echo "$line" | grep -qE '^(feat|fix|chore|docs|test|refactor|perf|ci|build|style)(\(.+\))?!?: .+'; then
              echo "✅ Valid commit: $line"
              FOUND_VALID=true
            else
              echo "ℹ️ Skipping non-conventional commit: $line"
            fi
          done < <(git log --format="%s" origin/${{ github.event.pull_request.base.ref }}..HEAD)

          if [ "$FOUND_VALID" = false ]; then
            echo "❌ No commits follow Conventional Commits format (type(scope): description)"
            echo "Valid types: feat, fix, chore, docs, test, refactor, perf, ci, build, style"
            exit 1
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
