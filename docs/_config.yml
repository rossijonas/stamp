theme: null

title: Stamp
tagline: A lightweight yet powerful wrapper for your native package managers
description: >-
  Install, track, and restore packages across multiple native package
  managers through a single CLI — without changing your tools.
url: "https://gostamp.dev"
author: rossijonas

social:
  name: Stamp
  links:
    - https://github.com/rossijonas/stamp

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - README.md

# Default front matter for all markdown files
defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "index.html"
    values:
      layout: "default"
  - scope:
      path: "decisions"
    values:
      layout: "page"
